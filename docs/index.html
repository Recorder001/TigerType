<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>호랑이타자연습 — 공식 포럼</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 별 배경 -->
<canvas id="stars-canvas"></canvas>

<!-- 토스트 알림 -->
<div id="toast" class="toast"></div>

<!-- ══ 네비게이션 ══════════════════════════════════════ -->
<nav class="navbar">
    <a class="logo" id="nav-logo" href="#">호랑이타자연습</a>
    <div class="nav-links">
        <!-- 로그인 상태 -->
        <div id="nav-logged-in" style="display:none; gap:8px; align-items:center;">
            <span class="nav-nick" id="nav-nickname"></span>
            <button class="nav-btn" id="nav-profile">프로필</button>
            <button class="nav-btn" id="nav-logout">로그아웃</button>
        </div>
        <!-- 비로그인 상태 -->
        <div id="nav-logged-out" style="display:flex; gap:8px;">
            <button class="nav-btn" id="nav-login">로그인</button>
            <button class="nav-btn" id="nav-signup">회원가입</button>
        </div>
    </div>
</nav>

<div class="container">

<!-- ══════════════════════════════════════════════════════
     메인 페이지
     ══════════════════════════════════════════════════════ -->
<div id="page-main" class="page active">

    <!-- 다운로드 배너 -->
    <div id="download-banner" style="
        background: linear-gradient(135deg, var(--panel2), var(--panel));
        border: 1px solid var(--accent);
        border-radius: 14px;
        padding: 24px 28px;
        margin-bottom: 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        box-shadow: 0 4px 24px var(--accent-glow);
    ">
        <div>
            <div style="font-size:20px; font-weight:900; color:var(--title-col); margin-bottom:4px;">
                호랑이타자연습 다운로드
            </div>
            <div style="font-size:13px; color:var(--stat-lbl);">
                Windows 전용 · 설치 없이 바로 실행
            </div>
        </div>
        <a href="https://github.com/Recorder001/TigerType/releases/latest/download/TigerType.zip"
           class="btn btn-accent" style="white-space:nowrap; padding:12px 32px; font-size:16px;">
            다운로드
        </a>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('ranking')">랭킹</button>
        <button class="tab-btn" onclick="switchTab('shared')">커스텀 글귀</button>
    </div>

    <!-- 랭킹 탭 -->
    <div id="tab-ranking" class="tab-content active">
        <div style="display:flex; align-items:center; gap:16px; margin-bottom:12px;">
            <h1 class="section-title" style="margin-bottom:0;" id="ranking-title">타수 랭킹</h1>
            <button class="btn-copy" onclick="loadRanking()" style="padding:6px 14px;">새로고침</button>
        </div>

        <!-- 서브 탭: 타수 / 연습글 / 도전 -->
        <div class="sub-tabs">
            <button class="sub-tab-btn active" onclick="switchRankMode('cpm')">타수 랭킹</button>
            <button class="sub-tab-btn" onclick="switchRankMode('text')">연습글 랭킹</button>
            <button class="sub-tab-btn challenge-btn" onclick="switchRankMode('challenge')">도전 모드</button>
        </div>

        <!-- 연습글 카드 (연습글 랭킹 모드) -->
        <div id="text-cards-wrap" style="display:none;">
            <div id="text-card-grid" class="text-card-grid"></div>
            <div id="text-detail-wrap"></div>
        </div>

        <!-- 타수/도전 테이블 -->
        <div id="ranking-table-wrap" style="overflow-x:auto;">
            <table class="ranking-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>닉네임</th>
                        <th>연습글</th>
                        <th>타수</th>
                        <th>정확도</th>
                        <th class="hide-mobile">시간</th>
                        <th class="hide-mobile">Backspace</th>
                        <th>태그</th>
                    </tr>
                </thead>
                <tbody id="ranking-body">
                    <tr><td colspan="8" class="loading-msg">
                        <span class="spinner"></span> 랭킹 불러오는 중...
                    </td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 공유 글귀 탭 -->
    <div id="tab-shared" class="tab-content">
        <h1 class="section-title">커스텀 글귀</h1>

        <!-- 공유 폼 (로그인 시만 표시) -->
        <div id="share-form-wrap" style="display:none;">
            <div class="share-form">
                <h3>새 커스텀 글귀 업로드</h3>
                <form id="share-form">
                    <div class="form-group">
                        <label>제목</label>
                        <input type="text" id="share-title" placeholder="글귀 제목" required>
                    </div>
                    <div class="form-group">
                        <label>내용</label>
                        <textarea id="share-body" placeholder="글귀 내용을 입력하세요..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-accent" style="margin-top:4px;">업로드</button>
                </form>
            </div>
        </div>

        <div id="shared-grid" class="shared-grid">
            <div class="loading-msg"><span class="spinner"></span> 불러오는 중...</div>
        </div>
    </div>
</div>

<!-- ══════════════════════════════════════════════════════
     로그인 페이지
     ══════════════════════════════════════════════════════ -->
<div id="page-login" class="page">
    <div class="form-card">
        <h2>로그인</h2>
        <form id="login-form">
            <div class="form-group">
                <label>이메일</label>
                <input type="email" id="login-email" placeholder="이메일을 입력하세요" required>
            </div>
            <div class="form-group">
                <label>비밀번호</label>
                <input type="password" id="login-pw" placeholder="비밀번호를 입력하세요" required>
            </div>
            <button type="submit" class="btn btn-accent btn-block">로그인</button>
        </form>
        <a class="form-link" id="link-to-signup" href="#">계정이 없으신가요? 회원가입</a>
    </div>
</div>

<!-- ══════════════════════════════════════════════════════
     회원가입 페이지
     ══════════════════════════════════════════════════════ -->
<div id="page-signup" class="page">
    <div class="form-card">
        <h2>회원가입</h2>
        <form id="signup-form">
            <div class="form-group">
                <label>이메일</label>
                <input type="email" id="signup-email" placeholder="이메일을 입력하세요" required>
            </div>
            <div class="form-group">
                <label>비밀번호 (6자 이상)</label>
                <input type="password" id="signup-pw" placeholder="비밀번호를 입력하세요" required minlength="6">
            </div>
            <button type="submit" class="btn btn-accent btn-block">회원가입</button>
        </form>
        <a class="form-link" id="link-to-login" href="#">이미 계정이 있으신가요? 로그인</a>
    </div>
</div>

<!-- ══════════════════════════════════════════════════════
     프로필 페이지
     ══════════════════════════════════════════════════════ -->
<div id="page-profile" class="page">
    <div class="profile-card">
        <h2>프로필 설정</h2>
        <p class="profile-email" id="profile-email"></p>
        <form id="profile-form">
            <div class="form-group">
                <label>닉네임</label>
                <input type="text" id="profile-nick" placeholder="닉네임을 입력하세요" required maxlength="20">
            </div>
            <button type="submit" class="btn btn-accent btn-block">닉네임 변경</button>
        </form>
        <a class="form-link" id="link-to-main" href="#">메인으로 돌아가기</a>
    </div>
</div>

</div><!-- /.container -->

<script type="module" src="js/app.js"></script>
</body>
</html>
